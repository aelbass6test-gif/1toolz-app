<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <script>
      // Immediately apply theme to prevent FOUC (Flash of Unstyled Content)
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme');
          var systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (savedTheme === 'dark' || (savedTheme === 'system' && systemTheme) || (!savedTheme && systemTheme)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مدير الأوردرات الذكي</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Readex+Pro:wght@300;400;600;700&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet" crossorigin="anonymous">
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Cairo', 'sans-serif';
        background-color: #f8fafc; /* slate-50 */
        color: #0f172a; /* slate-900 */
      }
      .dark body {
        background-color: #0f172a; /* slate-950 */
        color: #e2e8f0; /* slate-300 */
      }
      /* Revert scrollbar to default browser style */
      ::-webkit-scrollbar {
        all: initial;
      }
      ::-webkit-scrollbar-thumb {
        all: initial;
      }
      ::-webkit-scrollbar-track {
        all: initial;
      }
      .simple-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
